<script type="text/babel">

// ─── Activity tracking helpers ──────────────────────────────────
function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function todayKey() { return dateKey(new Date()); }

// Merge a day's activity delta into the activity log
function addActivity(activity, delta) {
  const k = todayKey();
  const d = activity[k] || { lessons: 0, exercises: 0, correct: 0, cards: 0, cardsKnown: 0 };
  return {
    ...activity,
    [k]: {
      lessons: d.lessons + (delta.lessons || 0),
      exercises: d.exercises + (delta.exercises || 0),
      correct: d.correct + (delta.correct || 0),
      cards: d.cards + (delta.cards || 0),
      cardsKnown: d.cardsKnown + (delta.cardsKnown || 0),
    },
  };
}

// Consecutive days with activity, counting up to today (or yesterday if today is empty)
function computeStreak(activity) {
  let streak = 0;
  const d = new Date();
  if (!activity[dateKey(d)]) d.setDate(d.getDate() - 1);
  while (activity[dateKey(d)]) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

// Last n calendar days, oldest first
function lastNDays(n) {
  const out = [];
  const now = new Date();
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(now.getDate() - i);
    out.push(d);
  }
  return out;
}

function activityTotals(activity) {
  return Object.values(activity).reduce((a, d) => ({
    lessons: a.lessons + (d.lessons || 0),
    exercises: a.exercises + (d.exercises || 0),
    correct: a.correct + (d.correct || 0),
    cards: a.cards + (d.cards || 0),
    cardsKnown: a.cardsKnown + (d.cardsKnown || 0),
  }), { lessons: 0, exercises: 0, correct: 0, cards: 0, cardsKnown: 0 });
}

window.dateKey = dateKey;
window.todayKey = todayKey;
window.computeStreak = computeStreak;
window.lastNDays = lastNDays;
window.activityTotals = activityTotals;

// ─── Storage migration ──────────────────────────────────────────
// v4: new exercise types (dialogue, replace, transform, cloze, bankgroup,
// simile, explain) + pool rebalancing — wipe the cached daily mix so the
// next session draws from the rebuilt pool.
const APP_VERSION = 4;
(function migrate() {
  let ver = 0;
  try { ver = Number(localStorage.getItem('engapp-version')) || 0; } catch (e) {}
  if (ver >= APP_VERSION) return;
  try {
    const s = JSON.parse(localStorage.getItem('engapp-state'));
    const activity = (s && s.activity) || {};
    const progress = (ver >= 3 && s && s.progress) ? s.progress : {};
    localStorage.setItem('engapp-state', JSON.stringify({ progress, activity }));
  } catch (e) {
    localStorage.removeItem('engapp-state');
  }
  localStorage.removeItem('engapp-daily');
  if (ver < 3) localStorage.removeItem('engapp-srs');
  localStorage.removeItem('engapp-screen');
  try { localStorage.setItem('engapp-version', String(APP_VERSION)); } catch (e) {}
})();

// ─── Unified exercise pool ──────────────────────────────────────
// base + production variants + reverse-vocab drills. choice/bank get
// replaced by their typed production variant when one exists; gap and
// the new types (explain, simile, dialogue, …) stay alongside their
// production siblings. The pool is then rebalanced to ≥80 % production.

const PRODUCTION_TYPES = new Set([
  'gaptype', 'type', 'bank', 'cloze', 'transform', 'replace', 'bankgroup', 'extraword',
]);

function isProduction(ex) {
  if (!ex) return false;
  if (ex.type === 'dialogue') return ex.mode !== 'pick';
  if (ex.type === 'replace')  return ex.mode !== 'pick';
  return PRODUCTION_TYPES.has(ex.type);
}

function getPoolStats(pool) {
  let production = 0, recognition = 0;
  pool.forEach(ex => { if (isProduction(ex)) production++; else recognition++; });
  const total = production + recognition;
  const ratio = total ? production / total : 0;
  return { production, recognition, total, ratio };
}

function rebalancePool(pool) {
  const start = getPoolStats(pool);
  // target ≥80 % production → keep all production, sample recognition
  // down to ≤ production / 4 (gives 80 / 20 split)
  const maxRecognition = Math.floor(start.production / 4);
  if (start.recognition <= maxRecognition) {
    console.log(`Pool: ${start.production} prod / ${start.recognition} rec (ratio ${(start.ratio*100).toFixed(1)}%) — no rebalance needed`);
    return pool;
  }
  const productionEx = [], recognitionEx = [];
  pool.forEach(ex => { (isProduction(ex) ? productionEx : recognitionEx).push(ex); });
  // sample recognition with the same Fisher-Yates we use elsewhere
  const sampledRec = shuffleList(recognitionEx).slice(0, maxRecognition);
  const out = [...productionEx, ...sampledRec];
  const end = getPoolStats(out);
  console.log(
    `Pool rebalanced: started ${start.production}/${start.recognition} ` +
    `(${(start.ratio*100).toFixed(1)}%), ended ${end.production}/${end.recognition} ` +
    `(${(end.ratio*100).toFixed(1)}%)`
  );
  return out;
}

function allExercises() {
  const out = [];
  TOPICS.forEach(t => {
    const lesson = LESSONS[t.id];
    if (!lesson) return;
    lesson.exercises.forEach((ex, i) => {
      const v = window.toProductionVariant ? toProductionVariant(ex, t.id, i) : null;
      const replacedByProd = v && (ex.type === 'choice' || ex.type === 'bank');
      if (!replacedByProd) out.push(ex);
      if (v) out.push(v);
    });
  });
  if (window.generateReverseExercises) {
    generateReverseExercises().forEach(ex => out.push(ex));
  }
  return rebalancePool(out);
}
window.allExercises = allExercises;
window.isProduction = isProduction;
window.getPoolStats = getPoolStats;
window.rebalancePool = rebalancePool;

// ─── Daily mix — SRS-driven, 8 exercises ────────────────────────
function generateDailyMix() {
  const pool = allExercises();
  const byId = {};
  pool.forEach(ex => { if (ex._id) byId[ex._id] = ex; });
  const allIds = Object.keys(byId);

  const state = window.SRS ? SRS.getSrsState() : { items: {} };
  const prioritized = window.SRS ? SRS.getDueItems(allIds, state) : shuffleList(allIds);

  const selected = [];
  const used = new Set();
  let freshCount = 0;

  for (const id of prioritized) {
    if (selected.length >= 8) break;
    if (!byId[id] || used.has(id)) continue;
    const isNew = !state.items[id];
    if (isNew && freshCount >= 3) continue;
    selected.push(byId[id]);
    used.add(id);
    if (isNew) freshCount++;
  }

  const rest = shuffleList(pool.filter(ex => ex._id && !used.has(ex._id)));
  for (const ex of rest) {
    if (selected.length >= 8) break;
    selected.push(ex);
    used.add(ex._id);
  }

  return {
    date: todayKey(),
    exercises: shuffleList(selected),
    doneIndex: 0, mistakes: 0, correct: 0, completed: false,
  };
}

function loadDailyMix() {
  try {
    const d = JSON.parse(localStorage.getItem('engapp-daily'));
    if (d && d.date === todayKey() && Array.isArray(d.exercises) && d.exercises.length) return d;
  } catch (e) {}
  return generateDailyMix();
}

function shuffleList(a) {
  const arr = a.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Log pool composition once at startup so the 80/20 target is visible.
(function logPoolOnce() {
  try {
    const pool = allExercises();
    const s = getPoolStats(pool);
    console.log(`Pool: ${s.production} production / ${s.recognition} recognition (ratio: ${(s.ratio*100).toFixed(1)}%)`);
  } catch (e) {
    console.warn('Pool stat log failed:', e);
  }
})();

// ─── Screen transitions — iOS-style push / pop ──────────────────
// Keeps the outgoing and incoming screens mounted together for one
// animation, sliding them like a navigation stack. Direction comes from
// a depth map: deeper = push (new from the right, old parallaxes left),
// shallower = pop (old slides off right, revealing the screen beneath).
const SCREEN_DEPTH = {
  home: 0, category: 1, profile: 1, review: 1, vocabtest: 1,
  quicktest: 1, weakspots: 1, lastthemes: 1, daily: 1, lesson: 2, results: 3,
};
const depthOf = (name) => (SCREEN_DEPTH[name] != null ? SCREEN_DEPTH[name] : 1);

// Single source of truth for a screen's top-zone colour. Everything that
// must match the top of the screen — the status bar (theme-color), the
// page background behind bounce-scroll, and the screen's own scroll
// container — reads from here, so colours can never drift apart.
function screenTheme(screen) {
  if (!screen) return '#FFFFFF';
  if (screen.name === 'home') return window.HOME_HERO || '#E8F1FC';
  if (screen.name === 'profile') return PROFILE_HERO;
  if (screen.name === 'category') {
    const c = window.UNIT_COLORS && window.UNIT_COLORS[screen.topicId];
    return (c && (c.solid || c.bg)) || '#FFFFFF';
  }
  return '#FFFFFF'; // lesson / review / quick test / etc. — white top bar
}
window.screenTheme = screenTheme;
const STAGE_MS = 440;
const STAGE_EASE = 'cubic-bezier(0.22, 1, 0.36, 1)';

function stageLayerStyle(layer) {
  const tr = `transform ${STAGE_MS}ms ${STAGE_EASE}, opacity ${STAGE_MS}ms ${STAGE_EASE}`;
  const base = {
    position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
    background: DS.paper, willChange: 'transform, opacity', overflow: 'hidden',
  };
  const push = layer.dir !== 'pop';
  if (layer.t === 'entering') {
    return { ...base, transition: 'none',
      transform: push ? 'translate3d(100%,0,0)' : 'translate3d(-26%,0,0)',
      opacity: push ? 1 : 0.6,
      zIndex: push ? 3 : 1,
      boxShadow: push ? '-10px 0 30px rgba(4,22,45,0.13)' : 'none' };
  }
  if (layer.t === 'leaving') {
    return { ...base, transition: tr,
      transform: push ? 'translate3d(-26%,0,0)' : 'translate3d(100%,0,0)',
      opacity: push ? 0.6 : 1,
      zIndex: push ? 1 : 3,
      boxShadow: push ? 'none' : '-10px 0 30px rgba(4,22,45,0.13)' };
  }
  // active
  return { ...base, transition: tr, transform: 'translate3d(0,0,0)', opacity: 1,
    zIndex: 2, boxShadow: 'none' };
}

function Stage({ screenKey, screenName, children }) {
  const [layers, setLayers] = React.useState(
    () => [{ key: screenKey, t: 'active', dir: 'push', node: children }]);
  const prevKey = React.useRef(screenKey);
  const prevName = React.useRef(screenName);
  const prevChildren = React.useRef(children);

  React.useEffect(() => {
    if (screenKey === prevKey.current) return;
    const dir = depthOf(screenName) >= depthOf(prevName.current) ? 'push' : 'pop';
    const oldKey = prevKey.current;
    const oldNode = prevChildren.current;
    prevKey.current = screenKey;
    prevName.current = screenName;

    setLayers(prev => {
      const leaving = prev
        .filter(l => l.t !== 'leaving')
        .map(l => ({ ...l, t: 'leaving', dir, node: l.key === oldKey ? oldNode : l.node }));
      return [...leaving, { key: screenKey, t: 'entering', dir, node: null }];
    });

    let raf2;
    const raf1 = requestAnimationFrame(() => {
      raf2 = requestAnimationFrame(() => {
        setLayers(prev => prev.map(l => (l.key === screenKey ? { ...l, t: 'active' } : l)));
      });
    });
    const tmo = setTimeout(() => {
      setLayers(prev => prev.filter(l => l.t !== 'leaving'));
    }, STAGE_MS + 80);
    return () => { cancelAnimationFrame(raf1); if (raf2) cancelAnimationFrame(raf2); clearTimeout(tmo); };
  }, [screenKey]);

  // Snapshot the latest committed children so the leaving layer can freeze
  // the previous screen while the active layer keeps rendering live.
  React.useEffect(() => { prevChildren.current = children; });

  return (
    <div style={{ position: 'relative', height: '100%', width: '100%', overflow: 'hidden', background: DS.paper }}>
      {layers.map(l => (
        <div key={l.key} style={stageLayerStyle(l)}>
          {l.key === screenKey ? children : l.node}
        </div>
      ))}
    </div>
  );
}

function App() {
  const [screen, setScreen] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('engapp-screen')) || { name: 'home' }; }
    catch { return { name: 'home' }; }
  });
  const [state, setState] = React.useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem('engapp-state'));
      if (s && s.progress) return { progress: s.progress, activity: s.activity || {} };
      return defaults();
    } catch { return defaults(); }
  });
  const [daily, setDaily] = React.useState(loadDailyMix);
  const [prefs, setPrefs] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('engapp-prefs')) || {}; }
    catch { return {}; }
  });

  React.useLayoutEffect(() => {
    localStorage.setItem('engapp-screen', JSON.stringify(screen));
    // One colour drives the status bar AND the page background, so the
    // top of the screen, the iOS status bar and any bounce-scroll all
    // share the current screen's theme colour — no white flashes.
    const theme = screenTheme(screen);
    const apply = () => {
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme);
    };
    // Apply before paint, then again next frame — iOS coalesces rapid
    // theme-color writes and otherwise keeps the previous screen's colour.
    apply();
    const raf = requestAnimationFrame(apply);
    document.documentElement.style.background = theme;
    document.body.style.background = theme;
    return () => cancelAnimationFrame(raf);
  }, [screen]);
  React.useEffect(() => {
    localStorage.setItem('engapp-state', JSON.stringify(state));
  }, [state]);
  React.useEffect(() => {
    localStorage.setItem('engapp-daily', JSON.stringify(daily));
  }, [daily]);
  React.useEffect(() => {
    localStorage.setItem('engapp-prefs', JSON.stringify(prefs));
  }, [prefs]);

  const changePrefs = (topicId, p) => setPrefs(x => ({ ...x, [topicId]: p }));

  function defaults() {
    return { progress: {}, activity: {} };
  }

  const streak = computeStreak(state.activity);
  const weakCount = React.useMemo(() => {
    if (!window.SRS) return 0;
    return SRS.getWeakSpots(SRS.getSrsState()).length;
  }, [screen]); // recompute whenever screen changes (after answering exercises)

  const go = (s) => setScreen(s);

  const startLesson = (topicId, tags, shuffle, mode) => {
    go({ name: 'lesson', lessonId: topicId, topicId, tags: tags || null, shuffle: !!shuffle, mode: mode || 'mix' });
  };

  const completeLesson = ({ mistakes, correct, total }) => {
    const topic = TOPICS.find(t => t.id === screen.topicId);
    const lessonsInTopic = Object.entries(LESSONS).filter(([_, l]) => l.topicId === topic.id);
    const lessonIdx = lessonsInTopic.findIndex(([id]) => id === screen.lessonId);
    const newDone = Math.max(Math.floor((state.progress[topic.id] || 0) * topic.lessons), lessonIdx + 1);
    const correctN = typeof correct === 'number' ? correct : Math.max(0, total - mistakes);
    const attempts = correctN + mistakes;
    setState(s => ({
      ...s,
      progress: { ...s.progress, [topic.id]: Math.min(1, newDone / topic.lessons) },
      activity: addActivity(s.activity, { lessons: 1, exercises: attempts, correct: correctN }),
    }));
    go({ name: 'results', mistakes, total, topicId: topic.id });
  };

  const completeReview = ({ total, known }) => {
    setState(s => ({
      ...s,
      activity: addActivity(s.activity, { cards: total, cardsKnown: known }),
    }));
  };

  const completeVocabTest = ({ total, correct }) => {
    setState(s => ({
      ...s,
      activity: addActivity(s.activity, { exercises: total, correct }),
    }));
  };

  const completeQuickTest = ({ total, correct }) => {
    setState(s => ({
      ...s,
      activity: addActivity(s.activity, { exercises: total, correct }),
    }));
  };

  const openDaily = () => {
    setDaily(d => (d.date === todayKey() ? d : generateDailyMix()));
    go({ name: 'daily' });
  };
  const advanceDaily = ({ doneIndex, mistakes, correct, exercises }) => {
    setDaily(d => ({ ...d, doneIndex, mistakes, correct, ...(exercises ? { exercises } : {}) }));
  };
  const completeDaily = ({ mistakes, correct, total }) => {
    const correctN = typeof correct === 'number' ? correct : Math.max(0, total - mistakes);
    setDaily(d => ({ ...d, doneIndex: total, mistakes, correct: correctN, completed: true }));
    setState(s => ({
      ...s,
      activity: addActivity(s.activity, { exercises: correctN + mistakes, correct: correctN }),
    }));
  };

  let content = null;
  if (screen.name === 'home') {
    content = (
      <HomeScreen
        progress={state.progress}
        streak={streak}
        daily={daily}
        onPickLesson={(topic) => go({ name: 'category', topicId: topic.id })}
        onOpenReview={() => go({ name: 'review' })}
        onOpenVocabTest={() => go({ name: 'vocabtest' })}
        onOpenQuickTest={() => go({ name: 'quicktest' })}
        onOpenLastThemes={() => go({ name: 'lastthemes' })}
        onOpenProfile={() => go({ name: 'profile' })}
        onOpenDaily={openDaily}
      />
    );
  } else if (screen.name === 'category') {
    const topic = TOPICS.find(t => t.id === screen.topicId);
    content = (
      <CategoryScreen
        topic={topic}
        lesson={LESSONS[topic.id]}
        prefs={prefs[topic.id]}
        onChangePrefs={changePrefs}
        onStart={startLesson}
        onBack={() => go({ name: 'home' })}
      />
    );
  } else if (screen.name === 'lesson') {
    const topic = TOPICS.find(t => t.id === screen.topicId);
    const base = LESSONS[screen.lessonId];
    let exs = base.exercises;
    if (screen.tags && screen.tags.length) {
      const filtered = exs.filter(e => screen.tags.includes(e.tag));
      if (filtered.length) exs = filtered;
    }
    if (screen.mode && screen.mode !== 'mix') {
      const wantProd = screen.mode === 'production';
      const filtered = exs.filter(e => window.isProduction(e) === wantProd);
      if (filtered.length) exs = filtered;
    }
    if (screen.shuffle) exs = shuffleList(exs);
    const lesson = { ...base, exercises: exs };
    content = (
      <LessonScreen
        lessonId={screen.lessonId}
        lesson={lesson}
        topic={topic}
        onComplete={completeLesson}
        onExit={() => go({ name: 'category', topicId: topic.id })}
      />
    );
  } else if (screen.name === 'daily') {
    content = (
      <DailyScreen
        daily={daily}
        onAdvance={advanceDaily}
        onComplete={completeDaily}
        onExit={() => go({ name: 'home' })}
      />
    );
  } else if (screen.name === 'results') {
    content = (
      <ResultsScreen
        mistakes={screen.mistakes}
        total={screen.total}
        onDone={() => go({ name: 'home' })}
      />
    );
  } else if (screen.name === 'review') {
    content = (
      <ReviewScreen onExit={() => go({ name: 'home' })} onComplete={completeReview} />
    );
  } else if (screen.name === 'vocabtest') {
    content = (
      <VocabTestScreen onExit={() => go({ name: 'home' })} onComplete={completeVocabTest} />
    );
  } else if (screen.name === 'quicktest') {
    content = (
      <QuickTestScreen onExit={() => go({ name: 'home' })} onComplete={completeQuickTest} />
    );
  } else if (screen.name === 'lastthemes' || screen.name === 'weakspots') {
    content = (
      <LastThemesScreen onExit={() => go({ name: 'home' })} />
    );
  } else if (screen.name === 'profile') {
    content = (
      <ProfileScreen state={state} streak={streak} weakCount={weakCount} onBack={() => go({ name: 'home' })} />
    );
  }

  const screenKey = `${screen.name}:${screen.topicId || ''}:${screen.lessonId || ''}`;
  return (
    <div id="app-stage">
      <IOSDevice width={402} height={844}>
        <Stage screenKey={screenKey} screenName={screen.name}>
          {content}
        </Stage>
      </IOSDevice>
    </div>
  );
}

// ─── Profile — Headspace structure, our blue hero style ──────────
const PROFILE_HERO = '#1B77E7';

function ProfileSection({ children }) {
  return (
    <div style={{
      fontFamily: DS.display, fontSize: 19, fontWeight: 700, color: DS.ink,
      letterSpacing: -0.4, margin: '26px 4px 8px',
    }}>{children}</div>
  );
}

function StatRow({ icon, value, label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '10px 4px' }}>
      <img src={`icons/${icon}`} alt="" width="34" height="34" style={{ flexShrink: 0 }} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div className="tick" style={{
          fontFamily: DS.display, fontSize: 20, fontWeight: 700, color: DS.ink,
          letterSpacing: -0.4, lineHeight: 1.1,
        }}>{value}</div>
        <div style={{ fontSize: 13, color: DS.ink3, marginTop: 2, letterSpacing: -0.1 }}>{label}</div>
      </div>
    </div>
  );
}

function ProfileScreen({ state, streak, weakCount, onBack }) {
  const activity = state.activity || {};
  const totalLessons = TOPICS.reduce((s, t) => s + t.lessons, 0);
  const doneLessons = TOPICS.reduce((s, t) => s + Math.floor((state.progress[t.id] || 0) * t.lessons), 0);

  const totals = activityTotals(activity);
  const accuracy = totals.exercises ? Math.round((totals.correct / totals.exercises) * 100) : 0;
  const practiceMins = Math.round((totals.exercises + totals.cards) * 0.5);

  // Real last-7-days activity for the chart
  const week = lastNDays(7).map((d) => ({
    letter: ['S','M','T','W','T','F','S'][d.getDay()],
    exercises: (activity[dateKey(d)] || {}).exercises || 0,
  }));
  const weekMax = Math.max(1, ...week.map(w => w.exercises));

  // "Learning since" — derived from the earliest day with activity
  const keys = Object.keys(activity).sort();
  const months = ['January','February','March','April','May','June','July',
    'August','September','October','November','December'];
  let since = 'Your learning profile';
  if (keys.length) {
    const first = new Date(keys[0] + 'T00:00:00');
    since = `B2–C1 · learning since ${months[first.getMonth()]}`;
  }

  const inProgress = TOPICS.filter(t => (state.progress[t.id] || 0) > 0 && (state.progress[t.id] || 0) < 1);

  return (
    <div style={{
      height: '100%', overflow: 'auto', overscrollBehavior: 'contain',
      // Scroll canvas = screen theme, so bounce shows the blue top tone.
      background: PROFILE_HERO, color: DS.ink, fontFamily: DS.sans,
      display: 'flex', flexDirection: 'column',
    }}>
      {/* Blue hero — covers the safe-area, holds the back button */}
      <div style={{
        background: PROFILE_HERO, flexShrink: 0, position: 'relative',
        height: `calc(max(${DS.topSafe}px, env(safe-area-inset-top, ${DS.topSafe}px)) + 136px)`,
      }}>
        <button onClick={onBack} className="tap" aria-label="Back to home"
          style={{
            position: 'absolute', left: 16,
            top: `max(${DS.topSafe - 4}px, calc(env(safe-area-inset-top, ${DS.topSafe}px) - 4px))`,
            width: 38, height: 38, borderRadius: 999, border: 'none',
            background: '#FFFFFF', color: PROFILE_HERO, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 0,
          }}>
          <svg width="18" height="18" viewBox="0 0 16 16">
            <path d="M10 3L5 8l5 5" stroke="currentColor" strokeWidth="2" fill="none"
              strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        </button>
      </div>

      {/* White sheet — convex arc, avatar on the arc, then content */}
      <div className="anim-slide-u" style={{
        flex: '1 0 auto', marginTop: -56,
        background: DS.paper, position: 'relative',
        borderTopLeftRadius: '50% 56px', borderTopRightRadius: '50% 56px',
        padding: `60px 20px calc(40px + env(safe-area-inset-bottom, 0px))`,
      }}>
        {/* Avatar — straddles the arc, white ring */}
        <div style={{
          position: 'absolute', top: -48, left: '50%', transform: 'translateX(-50%)',
          width: 96, height: 96, borderRadius: 999, boxSizing: 'border-box',
          border: '12px solid #FFFFFF', overflow: 'hidden', background: DS.ink,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <span style={{ color: '#FFFFFF', fontFamily: DS.display, fontWeight: 700, fontSize: 30 }}>T</span>
          <img src="icons/ava.png" alt=""
            onError={e => { e.target.style.display = 'none'; }}
            style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />
        </div>

        <h1 style={{
          fontFamily: DS.display, fontSize: 26, fontWeight: 700,
          letterSpacing: -0.5, margin: 0, lineHeight: 1.2, color: DS.ink, textAlign: 'center',
        }}>Timur</h1>
        <div style={{
          fontSize: 14, color: DS.ink3, marginTop: 6, letterSpacing: -0.1, textAlign: 'center',
        }}>{since}</div>

        {/* Stats */}
        <ProfileSection>Stats</ProfileSection>
        <StatRow icon="majesticons_timer.svg" value={`${practiceMins} min${practiceMins === 1 ? '' : 's'}`} label="Total practice time" />
        <StatRow icon="majesticons_list-box.svg" value={totals.exercises} label="Exercises answered" />
        <StatRow icon="majesticons_info-circle.svg" value={totals.exercises ? `${accuracy}%` : '—'} label="Answer accuracy" />
        <StatRow icon="majesticons_compass-2.svg" value={`${doneLessons}/${totalLessons}`} label="Lessons completed" />

        {/* Streak */}
        <ProfileSection>Streak</ProfileSection>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '6px 4px' }}>
          <img src="icons/majesticons_fire.svg" alt="" width="38" height="38" style={{ flexShrink: 0 }} />
          <div style={{ flex: 1 }}>
            <div className="tick" style={{
              fontFamily: DS.display, fontSize: 24, fontWeight: 700, color: DS.ink, letterSpacing: -0.5, lineHeight: 1.1,
            }}>{streak} day{streak === 1 ? '' : 's'}</div>
            <div style={{ fontSize: 13, color: DS.ink3, marginTop: 2, letterSpacing: -0.1 }}>
              {streak > 0 ? 'Keep it going — practise today' : 'Practise today to start a streak'}
            </div>
          </div>
        </div>

        {/* This week */}
        <ProfileSection>This week</ProfileSection>
        <div style={{ background: DS.paperCard, borderRadius: 18, padding: 18, margin: '0 0 4px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', height: 96, gap: 8 }}>
            {week.map((d, i) => {
              const today = i === week.length - 1;
              const h = 6 + Math.round((d.exercises / weekMax) * 78);
              return (
                <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
                  <span className="tick" style={{ fontSize: 10, fontWeight: 600, color: d.exercises ? DS.ink3 : 'transparent', letterSpacing: -0.1 }}>{d.exercises || 0}</span>
                  <div style={{
                    width: '100%', height: h,
                    background: today ? PROFILE_HERO : (d.exercises ? DS.ink4 : DS.ink5),
                    borderRadius: 6,
                    transition: `height 400ms ${DS.ease}`,
                  }} />
                  <span className="tick" style={{ fontSize: 11, fontWeight: 600, color: today ? PROFILE_HERO : DS.ink3, letterSpacing: -0.1 }}>{d.letter}</span>
                </div>
              );
            })}
          </div>
        </div>

        {/* Units in progress */}
        {inProgress.length > 0 && (
          <>
            <ProfileSection>Units in progress</ProfileSection>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {inProgress.map((t) => {
                const meta = (window.UNIT_META && window.UNIT_META[t.id]) || { icon: 'majesticons_skull.svg' };
                return (
                  <div key={t.id} style={{
                    background: DS.paperCard, borderRadius: 14, padding: '12px 14px',
                    display: 'flex', alignItems: 'center', gap: 12,
                  }}>
                    <MaskIcon src={`icons/${meta.icon}`} size={24} color="#9AA0A8" style={{ flexShrink: 0 }} />
                    <span style={{
                      flex: 1, fontFamily: DS.display, fontWeight: 600,
                      fontSize: 15, color: DS.ink, letterSpacing: -0.3,
                    }}>{t.title}</span>
                    <span className="tick" style={{ fontSize: 13, color: DS.ink3, fontWeight: 600, letterSpacing: -0.1 }}>{Math.round((state.progress[t.id] || 0) * 100)}%</span>
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
